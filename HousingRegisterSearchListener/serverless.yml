service: lbh-housing-register-search-listener
provider:
  name: aws
  runtime: dotnet8
  memorySize: 2048
  tracing:
    lambda: true
    apiGateway: true
  stage: ${opt:stage}
  region: eu-west-2  

package:
  artifact: ./bin/release/net8.0/lbh-housing-register-search-listener.zip

functions:
  HousingRegisterSearchListener:
    name: ${self:service}-${self:provider.stage}
    handler: HousingRegisterSearchListener::HousingRegisterSearchListener.SqsFunction::FunctionHandler
    role: lambdaExecutionRole
    vpc:
      securityGroupIds: ${self:custom.securityGroups.${self:provider.stage}}
      subnetIds: ${self:custom.subnets.${self:provider.stage}}   
    environment:
      ### Re-use the same parameter as used by web api applications
      ENVIRONMENT:  ${ssm:/housing-tl/${self:provider.stage}/aspnetcore-environment}
      SEARCHDOMAIN: ${ssm:/housing-${self:provider.stage}/${self:provider.stage}/elasticsearch-domain}
    events:
      - sqs: ${ssm:/sqs-queue/${self:provider.stage}/housingregistersearch/arn}
  SearchDeploymentHookFunction:
    name: ${self:service}-${self:provider.stage}-deploymenthook
    handler: HousingRegisterSearchListener::HousingRegisterSearchListener.Functions.SearchDeploymentHookFunction::Handle
    role: lambdaExecutionRole
    vpc:
      securityGroupIds: ${self:custom.securityGroups.${self:provider.stage}}
      subnetIds: ${self:custom.subnets.${self:provider.stage}}
    timeout: 900
    environment:
      ### Re-use the same parameter as used by web api applications
      ENVIRONMENT:  ${ssm:/housing-tl/${self:provider.stage}/aspnetcore-environment}
      SEARCHDOMAIN: ${ssm:/housing-${self:provider.stage}/${self:provider.stage}/elasticsearch-domain}
resources:
  Resources:
    lambdaExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        Path: /${self:service}/${self:provider.stage}/
        RoleName: ${self:service}-lambdaExecutionRole
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service:
                  - lambda.amazonaws.com
              Action: sts:AssumeRole
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
          - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
        Policies:          
          - PolicyName: manageLogs
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - 'Fn::Join':
                        - ':'
                        - - 'arn:aws:logs'
                          - Ref: 'AWS::Region'
                          - Ref: 'AWS::AccountId'
                          - 'log-group:/aws/lambda/*:*:*'
                # - Effect: "Allow"
                #   Action:
                #     - "s3:PutObject"
                #     - "s3:GetObject"
                #   Resource:
                #     Fn::Join:
                #       - ""
                #       - - "arn:aws:s3:::"
                #         - "Ref": "ServerlessDeploymentBucket"
          - PolicyName: lambdaInvocation
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - "lambda:InvokeFunction"
                  Resource: "*"          
          - PolicyName: sqsAccess
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - "sqs:ChangeMessageVisibility"
                    - "sqs:DeleteMessage"
                    - "sqs:GetQueueAttributes"
                    - "sqs:GetQueueUrl"
                    - "sqs:ListQueueTags"
                    - "sqs:ReceiveMessage"
                    - "sqs:SendMessage"
                    - "kms:Decrypt"
                  Resource: "*"
          - PolicyName: dynamoDBAccess
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - "dynamodb:BatchGet*"
                    - "dynamodb:BatchWrite"
                    - "dynamodb:DeleteItem"
                    - "dynamodb:DescribeStream"
                    - "dynamodb:DescribeTable"
                    - "dynamodb:Get*"
                    - "dynamodb:PutItem"
                    - "dynamodb:Query"
                    - "dynamodb:Scan"
                    - "dynamodb:UpdateItem"
                  Resource:
                    - "Fn::Join":
                        - ":"
                        - - "arn:aws:dynamodb"
                          - Ref: "AWS::Region"
                          - Ref: "AWS::AccountId"
                          - "table/HousingRegister"
                    - "Fn::Join":
                        - ":"
                        - - "arn:aws:dynamodb"
                          - Ref: "AWS::Region"
                          - Ref: "AWS::AccountId"
                          - "table/HousingRegister/index/*"
    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupName: ${self:service}-${self:provider.stage}-sg
        GroupDescription: Allow all outbound traffic
        SecurityGroupEgress:
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0
        VpcId: ${self:custom.vpcId.${opt:stage}}
custom:
  vpcId:
    development: vpc-0d15f152935c8716f
    staging: vpc-064521a7a4109ba31
    production: vpc-006989d0b2bb070d9  # Updated for disaster recovery
  securityGroups:
    development:
      - Ref: LambdaSecurityGroup
    staging:
      - Ref: LambdaSecurityGroup
    production:
      - sg-08b1acb08bf85654b  # Updated for disaster recovery
  subnets:
    development:      
      - subnet-0140d06fb84fdb547
      - subnet-05ce390ba88c42bfd
    staging:
      - subnet-0743d86e9b362fa38
      - subnet-0ea0020a44b98a2ca
    production:
      - subnet-05e595c59b7d6c8df  # Updated for disaster recovery
      - subnet-0e6bc9b4ac24493cc  # Updated for disaster recovery

