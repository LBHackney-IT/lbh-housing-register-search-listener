version: 2.1

orbs:
  aws_assume_role: lbh-hackit/aws_assume_role@0.1.0
  sonarcloud: sonarsource/sonarcloud@2.0.0

executors:
  docker-python:
    docker:
      - image: circleci/python:3.7
  docker-terraform:
    docker:
      - image: "hashicorp/terraform:1.14"
  docker-dotnet:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0

references:
  workspace_root: &workspace_root "~"
  attach_workspace: &attach_workspace
    attach_workspace:
      at: *workspace_root

commands:
  assume-role-and-persist-workspace:
    description: "Assumes deployment role and persists credentials across jobs"
    parameters:
      aws-account:
        type: string
    steps:
      - checkout
      - aws_assume_role/assume_role:
          account: <<parameters.aws-account>>
          profile_name: default
          role: "LBH_Circle_CI_Deployment_Role"
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - .aws

  terraform-init-then-plan:
    description: "Initializes and runs a plan from terraform configuration"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          name: get and init
          command: |
            cd ./terraform/<<parameters.environment>>/
            terraform get -update=true
            terraform init
      - run:
          name: plan
          command: |
            cd ./terraform/<<parameters.environment>>/
            terraform plan -out=plan.out
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - .aws
            - project/*

  terraform-apply:
    description: "Applies terraform configuration"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - run:
          name: apply
          command: |
            cd ./terraform/<<parameters.environment>>/
            terraform apply -auto-approve plan.out

  deploy-lambda:
    description: "Deploys via Serverless"
    parameters:
      stage:
        type: enum
        enum: ["development", "staging", "production"]
      aws-central-parameter-account:
        type: enum
        enum: ["AWS_ACCOUNT_DEVELOPMENT", "AWS_ACCOUNT_STAGING", "AWS_ACCOUNT_PRODUCTION"]
    steps:
      - *attach_workspace
      - checkout
      - restore_cache:
          name: Restore NuGet cache
          keys:
            - nuget-v1-{{ checksum "HousingRegisterSearchListener/HousingRegisterSearchListener.csproj" }}
            - nuget-v1-
      - restore_cache:
          name: Restore dotnet global tools cache
          keys:
            - dotnet-lambda-tools-4.0.0
      - restore_cache:
          name: Restore npm cache
          keys:
            - npm-serverless-v4
      - run:
          name: Install Node and AWS CLI
          command: |
            apt-get update
            apt-get install -y curl ca-certificates awscli
            curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
            apt-get install -y nodejs
      - run:
          name: Fetch SSM parameters from central account for serverless deployment
          command: |
            CENTRAL_ACCOUNT=${<<parameters.aws-central-parameter-account>>}
            export SEARCH_DOMAIN=$(aws ssm get-parameter \
              --name arn:aws:ssm:eu-west-2:${CENTRAL_ACCOUNT}:parameter/housing-<<parameters.stage>>/housing-register-<<parameters.stage>>/housing-register/search-domain \
              --query Parameter.Value \
              --output text)

            echo "export SEARCH_DOMAIN=${SEARCH_DOMAIN}" >> $BASH_ENV
      - run:
          name: Build and deploy lambda
          command: |
            set -e
            cd ./HousingRegisterSearchListener/
            chmod +x ./build.sh
            ./build.sh

            npx --yes serverless@4 deploy \
              --stage <<parameters.stage>> \
              --param="searchDomain=${SEARCH_DOMAIN}" \
              --conceal
      # only required for initial search configuration, please do not enable unless setting up a new environment
      # - run:
      #     name: Invoke elasticsearch deploy hook function
      #     command: |
      #       cd ./HousingRegisterSearchListener/
      #       sls invoke --stage <<parameters.stage>> --function SearchDeploymentHookFunction --data \"${CIRCLE_BUILD_NUM}\"
      - save_cache:
          name: Save NuGet cache
          key: nuget-v1-{{ checksum "HousingRegisterSearchListener/HousingRegisterSearchListener.csproj" }}
          paths:
            - ~/.nuget/packages
      - save_cache:
          name: Save dotnet global tools cache
          key: dotnet-lambda-tools-4.0.0
          paths:
            - ~/.dotnet/tools
      - save_cache:
          name: Save npm cache
          key: npm-serverless-v4
          paths:
            - ~/.npm

jobs:
  check-code-formatting:
    executor: docker-dotnet
    steps:
      - checkout
      - run:
          name: Run formatter check
          command: dotnet format --verify-no-changes

  build-and-test:
    executor: docker-python
    steps:
      - checkout:
          method: full
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: build
          command: docker-compose build lbh-housing-register-search-listener-test
      - run:
          name: Run tests
          command: docker-compose run lbh-housing-register-search-listener-test
      - run:
          name: Report
          command: |
            mkdir -p coverage test_results
            CID=$(docker ps -aqf "name=lbh-housing-register-search-listener-test" | head -n1)
            if [ -z "${CID}" ]; then
              echo "No test container found matching name=lbh-housing-register-search-listener-test"
              exit 1
            fi
            docker cp "${CID}:/app/coverage/." ./coverage/
            docker cp "${CID}:/app/test_results/." ./test_results/
            find coverage -name '*.opencover.xml' -exec sed -i "s|/app/|$(pwd)/|g" {} +
      - store_test_results:
          path: test_results
      - sonarcloud/scan

  assume-role-development:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_DEVELOPMENT

  assume-role-staging:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_STAGING

  assume-role-production:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_PRODUCTION

  terraform-init-and-plan-development:
    executor: docker-terraform
    steps:
      - terraform-init-then-plan:
          environment: "development"

  terraform-init-and-plan-staging:
    executor: docker-terraform
    steps:
      - terraform-init-then-plan:
          environment: "staging"

  terraform-init-and-plan-production:
    executor: docker-terraform
    steps:
      - terraform-init-then-plan:
          environment: "production"

  terraform-apply-development:
    executor: docker-terraform
    steps:
      - terraform-apply:
          environment: "development"

  terraform-apply-staging:
    executor: docker-terraform
    steps:
      - terraform-apply:
          environment: "staging"

  terraform-apply-production:
    executor: docker-terraform
    steps:
      - terraform-apply:
          environment: "production"

  deploy-to-development:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "development"
          aws-central-parameter-account: "AWS_ACCOUNT_DEVELOPMENT"

  deploy-to-staging:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "staging"
          aws-central-parameter-account: "AWS_ACCOUNT_STAGING"

  deploy-to-production:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "production"
          aws-central-parameter-account: "AWS_ACCOUNT_PRODUCTION"

workflows:
  check-and-deploy-development:
    jobs:
      - check-code-formatting:
          context: api-nuget-token-context
      - build-and-test:
          context:
            - SonarCloud
            - api-nuget-token-context
      - assume-role-development:
          context: api-assume-role-housing-development-context
          requires:
            - build-and-test
            - check-code-formatting
          filters:
            branches:
              only: bugfix/clean-circle
      - deploy-to-development:
          context:
            - api-nuget-token-context
            - Serverless Framework
            - central-parameter-store-context
          requires:
            - assume-role-development
          filters:
            branches:
              only: bugfix/clean-circle

  check-and-deploy-staging-and-production:
    jobs:
      - check-code-formatting:
          context: api-nuget-token-context
          filters:
            branches:
              only: master
      - build-and-test:
          context:
            - SonarCloud
            - api-nuget-token-context
          filters:
            branches:
              only: master
      - assume-role-staging:
          context: api-assume-role-housing-staging-context
          requires:
            - build-and-test
          filters:
            branches:
              only: master
      - deploy-to-staging:
          context:
            - api-nuget-token-context
            - Serverless Framework
            - central-parameter-store-context
          requires:
            - assume-role-staging
          filters:
            branches:
              only: master
      - permit-production-workflow:
          type: approval
          requires:
            - deploy-to-staging
          filters:
            branches:
              only: master
      - assume-role-production:
          context: api-assume-role-housing-production-context
          requires:
            - permit-production-workflow
          filters:
            branches:
              only: master
      - permit-production-release:
          type: approval
          requires:
            - assume-role-production
          filters:
            branches:
              only: master
      - deploy-to-production:
          context:
            - api-nuget-token-context
            - Serverless Framework
            - central-parameter-store-context
          requires:
            - permit-production-release
          filters:
            branches:
              only: master

  deploy-development-terraform:
    jobs:
      - permit-development-terraform-workflow:
          type: approval
          filters:
            branches:
              only: bugfix/clean-circle
      - assume-role-development:
          context: api-assume-role-housing-development-context
          requires:
            - permit-development-terraform-workflow
          filters:
            branches:
              only: bugfix/clean-circle
      - terraform-init-and-plan-development:
          requires:
            - assume-role-development
          filters:
            branches:
              only: bugfix/clean-circle
      - permit-development-terraform-release:
          type: approval
          requires:
            - terraform-init-and-plan-development
          filters:
            branches:
              only: bugfix/clean-circle
      - terraform-apply-development:
          requires:
            - permit-development-terraform-release
          filters:
            branches:
              only: bugfix/clean-circle

  deploy-staging-terraform:
    jobs:
      - permit-staging-terraform-workflow:
          type: approval
          filters:
            branches:
              only: master
      - assume-role-staging:
          context: api-assume-role-housing-staging-context
          requires:
            - permit-staging-terraform-workflow
          filters:
            branches:
              only: master
      - terraform-init-and-plan-staging:
          requires:
            - assume-role-staging
          filters:
            branches:
              only: master
      - permit-staging-terraform-release:
          type: approval
          requires:
            - terraform-init-and-plan-staging
          filters:
            branches:
              only: master
      - terraform-apply-staging:
          requires:
            - permit-staging-terraform-release
          filters:
            branches:
              only: master

  deploy-production-terraform:
    jobs:
      - permit-production-terraform-workflow:
          type: approval
          filters:
            branches:
              only: master
      - assume-role-production:
          context: api-assume-role-housing-production-context
          requires:
            - permit-production-terraform-workflow
          filters:
            branches:
              only: master
      - terraform-init-and-plan-production:
          requires:
            - assume-role-production
          filters:
            branches:
              only: master
      - permit-production-terraform-release:
          type: approval
          requires:
            - terraform-init-and-plan-production
          filters:
            branches:
              only: master
      - terraform-apply-production:
          requires:
            - permit-production-terraform-release
          filters:
            branches:
              only: master
